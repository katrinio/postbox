services:
  postbox:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8013:3000"
    environment:
      POSTBOX_DATABASE_URL: sqlite+aiosqlite:////data/postbox.db
      POSTBOX_JWT_SECRET_KEY: ${POSTBOX_JWT_SECRET_KEY}
      POSTBOX_REGISTRATION_LIMIT: ${POSTBOX_REGISTRATION_LIMIT:-5}
      POSTBOX_LOG_LEVEL: ${POSTBOX_LOG_LEVEL:-INFO}
      POSTBOX_PUBLIC_URL: ${POSTBOX_PUBLIC_URL:-}
      NEXT_PUBLIC_POSTBOX_API_URL: ${NEXT_PUBLIC_POSTBOX_API_URL:-}
      POSTBOX_API_RELOAD: "false"
    volumes:
      - ./data:/data
    healthcheck:
      test: curl --fail --silent http://127.0.0.1:8000/api/ready
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
