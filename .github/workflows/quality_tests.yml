name: 🪛 Quality tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  code-style:
    name: 💅 Code style
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run Ruff
        run: poetry run ruff check .

      - name: Run MyPy
        run: poetry run mypy src

  tests-and-coverage:
    name: 🪛 Tests and coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: postbox_test
          POSTGRES_USER: postbox
          POSTGRES_PASSWORD: postbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postbox -d postbox_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTBOX_DATABASE_URL: postgresql+psycopg://postbox:postbox@localhost:5432/postbox_test
      POSTBOX_TEST_DATABASE_URL: postgresql+psycopg://postbox:postbox@localhost:5432/postbox_test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Apply and verify migrations
        run: |
          poetry run alembic upgrade head
          poetry run alembic check

      - name: Run tests and coverage
        run: |
          poetry run pytest tests \
            --cov=src \
            --cov-report=term-missing \
            -q \
            -ra \
            --durations=10
