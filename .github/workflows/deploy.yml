name: 🚀 Deploy Postbox

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'web/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-postbox
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/katrinio/postbox:latest
            ghcr.io/katrinio/postbox:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          timeout: 60s
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd ~/projects/postbox

            echo "🚀 Starting Postbox deployment..."

            # 1. Pull latest code
            echo "📥 Fetching latest code..."
            git fetch origin main
            git reset --hard origin/main

            # 2. Verify .env exists (do NOT overwrite it)
            if [[ ! -f .env ]]; then
              echo "❌ ERROR: .env file not found!"
              echo "   Create .env with production secrets before deploying."
              exit 1
            fi
            echo "✅ .env file verified (will be preserved)"

            # 3. Create backup before deployment
            if [[ -f data/postbox.db ]]; then
              echo "💾 Creating pre-deployment backup..."
              mkdir -p backups
              BACKUP_TIMESTAMP=$(date -u +'%Y-%m-%dT%H%M%SZ')
              sqlite3 "data/postbox.db" "VACUUM INTO 'backups/pre-deploy-${BACKUP_TIMESTAMP}.db'" || \
                echo "⚠️  Backup warning (non-fatal): could not backup"
            fi

            # 4. Build image
            echo "🐳 Building Docker image..."
            docker compose build

            # 5. Restart services gracefully
            echo "🔄 Restarting containers..."
            docker compose stop --timeout 30 || true
            docker compose rm -f
            docker compose up -d

            # 6. Wait for health check
            echo "⏳ Waiting for service to be healthy..."
            for i in {1..30}; do
              if curl -s --fail http://127.0.0.1:8000/api/ready >/dev/null 2>&1; then
                echo "✅ Postbox is healthy"
                docker compose ps
                docker image prune -f
                exit 0
              fi
              echo "Waiting... ($i/30)"
              sleep 2
            done

            echo "❌ Postbox failed to start"
            docker compose ps
            docker compose logs --tail=50
            exit 1
