<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
<style>
.line{stroke:#4b5563;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.dash{stroke:#6b7280;stroke-width:2.2;fill:none;stroke-dasharray:8 8}
.text{fill:#374151;font-family:Arial,sans-serif;font-size:16px}
.small{fill:#6b7280;font-family:Arial,sans-serif;font-size:13px}
.card{fill:#f8fafc;stroke:#d1d5db;stroke-width:1.5}
.accent{fill:#10b981}
</style>
<rect x="60" y="78" width="120" height="84" rx="8" class="line"/>
<path d="M60 86 L120 126 L180 86 M60 154 L110 116 M180 154 L130 116" class="line"/>
<text x="120" y="190" text-anchor="middle" class="small">sent</text>
<line x1="205" y1="120" x2="645" y2="120" class="dash"/>
<circle cx="300" cy="120" r="5" class="accent"/><circle cx="435" cy="120" r="5" class="accent"/><circle cx="570" cy="120" r="5" class="accent"/>
<text x="300" y="98" text-anchor="middle" class="small">sent</text>
<text x="435" y="98" text-anchor="middle" class="small">in transit</text>
<text x="570" y="98" text-anchor="middle" class="small">delivered</text>
<rect x="335" y="155" width="190" height="58" rx="10" class="card"/>
<text x="430" y="178" text-anchor="middle" class="text">Belgrade → Berlin</text>
<text x="430" y="198" text-anchor="middle" class="small">12 days</text>
<path d="M720 80 h55 a20 20 0 0 1 20 20 v60 h-95z" class="line"/>
<line x1="767" y1="160" x2="767" y2="192" class="line"/><line x1="747" y1="192" x2="787" y2="192" class="line"/>
<text x="767" y="215" text-anchor="middle" class="small">received</text>
<text x="450" y="38" text-anchor="middle" class="text">One letter. One journey. One record.</text>
</svg>